<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#111111"/>

  <!-- Left book page -->
  <rect x="6" y="7" width="10" height="14" rx="2" fill="#4f46e5"/>

  <!-- Right book page -->
  <rect x="16" y="7" width="10" height="14" rx="2" fill="#6366f1"/>

  <!-- Spine line -->
  <line x1="16" y1="7" x2="16" y2="21" stroke="#111111" stroke-width="1.5"/>

  <!-- Page lines on left -->
  <line x1="8.5" y1="11" x2="13.5" y2="11" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="8.5" y1="13.5" x2="13.5" y2="13.5" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="8.5" y1="16" x2="13.5" y2="16" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- Green check badge (bottom right) -->
  <circle cx="23" cy="23" r="6.5" fill="#10b981"/>
  <path d="M19.5 23 L22.2 25.8 L27 20" fill="none" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
